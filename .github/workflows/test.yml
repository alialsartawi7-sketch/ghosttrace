name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libcairo2-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask bcrypt pytest
        # weasyprint optional — skip if heavy

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Check syntax on all Python files
      run: |
        python -m compileall -q . 2>&1 | grep -v __pycache__ || echo "All files compile OK"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install linter
      run: pip install flake8

    - name: Lint (critical errors only)
      run: |
        # Only fail on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Informational warnings (don't fail)
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics || true
